services:
  visitka:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nadtocheev-visitka
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
