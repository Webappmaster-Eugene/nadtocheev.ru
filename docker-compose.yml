services:
  visitka:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.nadtocheev.rule=Host(`nadtocheev.ru`)"
      - "traefik.http.routers.nadtocheev.entrypoints=websecure"
      - "traefik.http.routers.nadtocheev.tls=true"
      - "traefik.http.routers.nadtocheev.tls.certresolver=letsencrypt"
      # HTTP router — redirect to HTTPS
      - "traefik.http.routers.nadtocheev-http.rule=Host(`nadtocheev.ru`)"
      - "traefik.http.routers.nadtocheev-http.entrypoints=web"
      - "traefik.http.routers.nadtocheev-http.middlewares=nadtocheev-redirect@docker"
      # Redirect middleware
      - "traefik.http.middlewares.nadtocheev-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.nadtocheev-redirect.redirectscheme.permanent=true"
      # Service port
      - "traefik.http.services.nadtocheev.loadbalancer.server.port=80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
